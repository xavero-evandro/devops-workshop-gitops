apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workshop-local
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xavero-evandro/devops-workshop-gitops
    targetRevision: main
    path: apps/workshop/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: workshop-local
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
